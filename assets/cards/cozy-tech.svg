<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cozy mountain workshop at dawn">
  <defs>
    <linearGradient id="sky-b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#313244"/>
      <stop offset="55%" stop-color="#45475a"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="mtn-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#585b70"/>
      <stop offset="100%" stop-color="#313244"/>
    </linearGradient>
    <linearGradient id="mtn-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#45475a"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9e2af" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#fab387" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fab387" stop-opacity="0.0"/>
    </radialGradient>
    <clipPath id="round-b"><rect width="800" height="500" rx="24" ry="24"/></clipPath>
  </defs>
  <g clip-path="url(#round-b)">
    <rect width="800" height="500" fill="url(#sky-b)"/>
    <circle cx="180" cy="180" r="160" fill="url(#sun)"/>
    <circle cx="180" cy="180" r="34" fill="#f9e2af" opacity="0.85">
      <animate attributeName="opacity" values="0.75;0.95;0.75" dur="6s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0.7">
      <ellipse cx="500" cy="120" rx="60" ry="10" fill="#cdd6f4" opacity="0.25">
        <animate attributeName="cx" values="500;540;500" dur="18s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="660" cy="160" rx="80" ry="12" fill="#cdd6f4" opacity="0.2">
        <animate attributeName="cx" values="660;620;660" dur="22s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="320" cy="100" rx="50" ry="8" fill="#cdd6f4" opacity="0.22">
        <animate attributeName="cx" values="320;360;320" dur="20s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <polygon points="0,330 120,180 240,260 380,160 520,250 660,180 800,260 800,500 0,500" fill="url(#mtn-far)"/>
    <polygon points="50,200 100,170 150,200" fill="#cdd6f4" opacity="0.55"/>
    <polygon points="350,180 380,160 410,180" fill="#cdd6f4" opacity="0.55"/>
    <polygon points="630,200 660,180 690,200" fill="#cdd6f4" opacity="0.55"/>
    <polygon points="0,500 60,400 180,440 300,360 440,420 560,360 680,410 800,380 800,500" fill="url(#mtn-mid)"/>
    <g transform="translate(440,330)">
      <rect x="0" y="40" width="120" height="80" fill="#181825"/>
      <polygon points="-10,40 60,-10 130,40" fill="#11111b"/>
      <rect x="20" y="60" width="22" height="22" fill="#fab387">
        <animate attributeName="opacity" values="0.75;1;0.75" dur="3.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="80" y="60" width="22" height="22" fill="#fab387">
        <animate attributeName="opacity" values="1;0.75;1" dur="3.0s" repeatCount="indefinite"/>
      </rect>
      <rect x="52" y="86" width="18" height="34" fill="#11111b"/>
      <rect x="56" y="-32" width="8" height="22" fill="#181825"/>
      <g>
        <ellipse cx="60" cy="-40" rx="9" ry="4" fill="#cdd6f4" opacity="0.55">
          <animate attributeName="cy" values="-40;-58;-40" dur="5.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.55;0.0;0.55" dur="5.2s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="62" cy="-50" rx="11" ry="5" fill="#cdd6f4" opacity="0.4">
          <animate attributeName="cy" values="-50;-72;-50" dur="6.0s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.4;0.0;0.4" dur="6.0s" repeatCount="indefinite"/>
        </ellipse>
      </g>
    </g>
    <g fill="#11111b">
      <rect x="80" y="440" width="8" height="20"/>
      <rect x="86" y="434" width="4" height="8"/>
      <rect x="76" y="434" width="4" height="8"/>
      <rect x="220" y="430" width="8" height="22"/>
      <rect x="226" y="424" width="4" height="8"/>
      <rect x="216" y="424" width="4" height="8"/>
      <rect x="660" y="438" width="8" height="20"/>
      <rect x="666" y="432" width="4" height="8"/>
      <rect x="656" y="432" width="4" height="8"/>
    </g>
  </g>
</svg>
