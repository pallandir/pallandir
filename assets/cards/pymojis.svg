<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="pymojis project card">
  <defs>
    <linearGradient id="border-p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cba6f7">
        <animate attributeName="stop-color" values="#cba6f7;#94e2d5;#f5c2e7;#cba6f7" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#94e2d5">
        <animate attributeName="stop-color" values="#94e2d5;#f5c2e7;#cba6f7;#94e2d5" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="bg-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <radialGradient id="glow-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cba6f7" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="3" y="3" width="894" height="254" rx="22" ry="22" fill="url(#bg-p)" stroke="url(#border-p)" stroke-width="2"/>
  <circle cx="740" cy="130" r="170" fill="url(#glow-p)"/>

  <text x="44" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="40" font-weight="700" fill="#cba6f7">pymojis</text>
  <text x="44" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#cdd6f4" opacity="0.92">Python package to integrate emojis support into your backend project.</text>

  <g transform="translate(44,150)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">
    <rect x="0" y="0" width="76" height="28" rx="14" ry="14" fill="#313244"/>
    <text x="38" y="19" text-anchor="middle" fill="#94e2d5">Python</text>
    <rect x="86" y="0" width="86" height="28" rx="14" ry="14" fill="#313244"/>
    <text x="129" y="19" text-anchor="middle" fill="#f5c2e7">backend</text>
    <rect x="182" y="0" width="100" height="28" rx="14" ry="14" fill="#313244"/>
    <text x="232" y="19" text-anchor="middle" fill="#fab387">opensource</text>
  </g>

  <text x="44" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#94e2d5" opacity="0.85">github.com/pallandir/pymojis →</text>

  <g transform="translate(740,130)">
    <text x="0" y="22" font-size="76" text-anchor="middle">
      <animate attributeName="opacity" values="1;0.55;1" dur="3.2s" repeatCount="indefinite"/>🤪</text>
    <circle cx="-70" cy="-50" r="2.4" fill="#f9e2af">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="-30" r="2" fill="#94e2d5">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="60" r="2.2" fill="#cba6f7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-66" cy="56" r="1.8" fill="#f5c2e7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-50" cy="78" r="1.4" fill="#94e2d5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="92" cy="14" r="1.6" fill="#fab387">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.9s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
