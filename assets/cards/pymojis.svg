<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" role="img" aria-label="pymojis project card">
  <defs>
    <linearGradient id="border-p" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cba6f7">
        <animate attributeName="stop-color" values="#cba6f7;#94e2d5;#f5c2e7;#cba6f7" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#94e2d5">
        <animate attributeName="stop-color" values="#94e2d5;#f5c2e7;#cba6f7;#94e2d5" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="bg-p" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <radialGradient id="glow-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cba6f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#cba6f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="416" height="196" rx="18" ry="18" fill="url(#bg-p)" stroke="url(#border-p)" stroke-width="1.5"/>
  <circle cx="350" cy="60" r="80" fill="url(#glow-p)"/>
  <text x="24" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="26" font-weight="700" fill="#cba6f7">pymojis</text>
  <text x="24" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#cdd6f4" opacity="0.92">Python package to integrate emojis</text>
  <text x="24" y="104" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#cdd6f4" opacity="0.92">support into your backend project.</text>
  <g transform="translate(24,140)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10">
    <rect x="0" y="0" width="56" height="20" rx="10" ry="10" fill="#313244"/>
    <text x="28" y="14" text-anchor="middle" fill="#94e2d5">Python</text>
    <rect x="64" y="0" width="64" height="20" rx="10" ry="10" fill="#313244"/>
    <text x="96" y="14" text-anchor="middle" fill="#f5c2e7">backend</text>
    <rect x="136" y="0" width="74" height="20" rx="10" ry="10" fill="#313244"/>
    <text x="173" y="14" text-anchor="middle" fill="#fab387">opensource</text>
  </g>
  <text x="24" y="184" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" fill="#94e2d5" opacity="0.85">github.com/pallandir/pymojis →</text>
  <g transform="translate(330,90)">
    <text x="0" y="0" font-size="38" text-anchor="middle">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>🤪</text>
    <circle cx="-30" cy="-22" r="2" fill="#f9e2af">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="34" cy="-12" r="1.6" fill="#94e2d5">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="28" r="1.8" fill="#cba6f7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-26" cy="22" r="1.4" fill="#f5c2e7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
