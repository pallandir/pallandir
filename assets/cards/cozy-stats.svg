<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cozy lake at dusk">
  <defs>
    <linearGradient id="sky-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="40%" stop-color="#45475a"/>
      <stop offset="80%" stop-color="#cba6f7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f5c2e7" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74c7ec" stop-opacity="0.7"/>
      <stop offset="55%" stop-color="#89b4fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="mtn-c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#45475a"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <radialGradient id="sun-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9e2af" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#fab387" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fab387" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round-c"><rect width="800" height="500" rx="24" ry="24"/></clipPath>
  </defs>
  <g clip-path="url(#round-c)">
    <rect width="800" height="500" fill="url(#sky-c)"/>
    <circle cx="500" cy="270" r="180" fill="url(#sun-c)"/>
    <circle cx="500" cy="270" r="42" fill="#f9e2af">
      <animate attributeName="r" values="42;46;42" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="8s" repeatCount="indefinite"/>
    </circle>
    <g fill="#cdd6f4">
      <circle cx="100" cy="60" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="100" r="1.0"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="260" cy="50" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.4s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="80" r="1.2"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="750" cy="140" r="1.0"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="620" cy="40" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    </g>
    <g opacity="0.6">
      <ellipse cx="120" cy="120" rx="55" ry="9" fill="#cdd6f4" opacity="0.25">
        <animate attributeName="cx" values="120;160;120" dur="22s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="640" cy="170" rx="70" ry="10" fill="#cdd6f4" opacity="0.22">
        <animate attributeName="cx" values="640;600;640" dur="26s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    <polygon points="0,310 110,200 240,280 360,180 500,250 620,200 740,260 800,230 800,330 0,330" fill="url(#mtn-c)"/>
    <polygon points="280,210 360,180 440,210" fill="#cdd6f4" opacity="0.45"/>
    <polygon points="580,225 620,200 660,225" fill="#cdd6f4" opacity="0.45"/>
    <rect x="0" y="330" width="800" height="170" fill="url(#lake)"/>
    <ellipse cx="500" cy="335" rx="38" ry="3" fill="#f9e2af" opacity="0.6">
      <animate attributeName="rx" values="38;42;38" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <g stroke="#cdd6f4" stroke-width="0.6" opacity="0.35" fill="none">
      <path d="M 40 380 Q 80 376 120 380 T 200 380"/>
      <path d="M 250 410 Q 290 406 330 410 T 410 410"/>
      <path d="M 480 400 Q 520 396 560 400 T 640 400"/>
      <path d="M 600 440 Q 640 436 680 440 T 760 440"/>
      <path d="M 60 460 Q 100 456 140 460 T 220 460"/>
    </g>
    <g transform="translate(150,290)">
      <rect x="0" y="0" width="40" height="10" fill="#181825"/>
      <polygon points="-4,0 4,-6 36,-6 44,0" fill="#11111b"/>
      <rect x="14" y="-6" width="3" height="6" fill="#fab387">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g transform="translate(150,332)" opacity="0.4">
      <rect x="0" y="0" width="40" height="6" fill="#181825">
        <animate attributeName="opacity" values="0.4;0.25;0.4" dur="5s" repeatCount="indefinite"/>
      </rect>
    </g>
    <g fill="#181825">
      <rect x="600" y="280" width="3" height="14"/>
      <polygon points="601,266 596,282 607,282"/>
      <rect x="630" y="290" width="3" height="14"/>
      <polygon points="631,278 626,292 637,292"/>
      <rect x="660" y="285" width="3" height="14"/>
      <polygon points="661,272 656,287 667,287"/>
    </g>
  </g>
</svg>
