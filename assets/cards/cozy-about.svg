<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cozy night sky with cabin">
  <defs>
    <linearGradient id="sky-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181825"/>
      <stop offset="55%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#313244"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9e2af" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#f9e2af" stop-opacity="0.0"/>
    </radialGradient>
    <clipPath id="round-a"><rect width="800" height="500" rx="24" ry="24"/></clipPath>
  </defs>
  <g clip-path="url(#round-a)">
    <rect width="800" height="500" fill="url(#sky-a)"/>
    <circle cx="640" cy="120" r="120" fill="url(#moonglow)"/>
    <circle cx="640" cy="120" r="38" fill="#f9e2af">
      <animate attributeName="opacity" values="0.92;1;0.92" dur="5s" repeatCount="indefinite"/>
