<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" role="img" aria-label="manifesto project card">
  <defs>
    <linearGradient id="border-m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94e2d5">
        <animate attributeName="stop-color" values="#94e2d5;#cba6f7;#fab387;#94e2d5" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#cba6f7">
        <animate attributeName="stop-color" values="#cba6f7;#fab387;#94e2d5;#cba6f7" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="bg-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <radialGradient id="glow-m" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94e2d5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#94e2d5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="2" y="2" width="416" height="196" rx="18" ry="18" fill="url(#bg-m)" stroke="url(#border-m)" stroke-width="1.5"/>
  <circle cx="350" cy="100" r="90" fill="url(#glow-m)"/>
  <text x="24" y="56" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="26" font-weight="700" fill="#94e2d5">manifesto</text>
  <text x="24" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#cdd6f4" opacity="0.92">A personal project · in the works ✨</text>
  <text x="24" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#cdd6f4" opacity="0.7">Currently private — coming soon.</text>
  <g transform="translate(24,140)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10">
    <rect x="0" y="0" width="58" height="20" rx="10" ry="10" fill="#313244"/>
    <text x="29" y="14" text-anchor="middle" fill="#cba6f7">private</text>
    <rect x="66" y="0" width="68" height="20" rx="10" ry="10" fill="#313244"/>
    <text x="100" y="14" text-anchor="middle" fill="#f5c2e7">in-progress</text>
  </g>
  <text x="24" y="184" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" fill="#cba6f7" opacity="0.7">stay tuned ✨</text>
  <g transform="translate(340,100)">
    <g>
      <rect x="-26" y="-30" width="52" height="60" rx="3" fill="#cdd6f4" opacity="0.92"/>
      <rect x="-26" y="-30" width="52" height="6" fill="#cba6f7"/>
      <line x1="-18" y1="-12" x2="18" y2="-12" stroke="#45475a" stroke-width="1.2"/>
      <line x1="-18" y1="-4" x2="14" y2="-4" stroke="#45475a" stroke-width="1.2"/>
      <line x1="-18" y1="4" x2="18" y2="4" stroke="#45475a" stroke-width="1.2"/>
      <line x1="-18" y1="12" x2="10" y2="12" stroke="#45475a" stroke-width="1.2"/>
      <line x1="-18" y1="20" x2="16" y2="20" stroke="#45475a" stroke-width="1.2"/>
      <animateTransform attributeName="transform" type="rotate" values="-2;2;-2" dur="6s" repeatCount="indefinite"/>
    </g>
    <circle cx="-36" cy="-36" r="1.8" fill="#f9e2af">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="-26" r="1.5" fill="#94e2d5">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="36" cy="34" r="1.6" fill="#cba6f7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
