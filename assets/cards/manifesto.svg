<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="manifesto project card">
  <defs>
    <linearGradient id="border-m" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94e2d5">
        <animate attributeName="stop-color" values="#94e2d5;#cba6f7;#fab387;#94e2d5" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#cba6f7">
        <animate attributeName="stop-color" values="#cba6f7;#fab387;#94e2d5;#cba6f7" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="bg-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
    <radialGradient id="glow-m" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94e2d5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#94e2d5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="3" y="3" width="894" height="254" rx="22" ry="22" fill="url(#bg-m)" stroke="url(#border-m)" stroke-width="2"/>
  <circle cx="740" cy="130" r="180" fill="url(#glow-m)"/>

  <text x="44" y="78" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="40" font-weight="700" fill="#94e2d5">manifesto</text>
  <text x="44" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#cdd6f4" opacity="0.92">A personal project · in the works ✨</text>
  <text x="44" y="144" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#cdd6f4" opacity="0.7">Currently private — coming soon.</text>

  <g transform="translate(44,170)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">
    <rect x="0" y="0" width="78" height="28" rx="14" ry="14" fill="#313244"/>
    <text x="39" y="19" text-anchor="middle" fill="#cba6f7">private</text>
    <rect x="88" y="0" width="98" height="28" rx="14" ry="14" fill="#313244"/>
    <text x="137" y="19" text-anchor="middle" fill="#f5c2e7">in-progress</text>
  </g>

  <text x="44" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#cba6f7" opacity="0.7">stay tuned ✨</text>

  <g transform="translate(740,130)">
    <g>
      <rect x="-50" y="-58" width="100" height="116" rx="6" fill="#cdd6f4" opacity="0.94"/>
      <rect x="-50" y="-58" width="100" height="12" fill="#cba6f7"/>
      <line x1="-36" y1="-24" x2="36" y2="-24" stroke="#45475a" stroke-width="1.6"/>
      <line x1="-36" y1="-10" x2="28" y2="-10" stroke="#45475a" stroke-width="1.6"/>
      <line x1="-36" y1="4" x2="36" y2="4" stroke="#45475a" stroke-width="1.6"/>
      <line x1="-36" y1="18" x2="22" y2="18" stroke="#45475a" stroke-width="1.6"/>
      <line x1="-36" y1="32" x2="32" y2="32" stroke="#45475a" stroke-width="1.6"/>
      <line x1="-36" y1="46" x2="18" y2="46" stroke="#45475a" stroke-width="1.6"/>
      <animateTransform attributeName="transform" type="rotate" values="-2;2;-2" dur="6s" repeatCount="indefinite"/>
    </g>
    <circle cx="-78" cy="-66" r="2.2" fill="#f9e2af">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="78" cy="-44" r="1.8" fill="#94e2d5">
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="74" cy="62" r="2" fill="#cba6f7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-72" cy="58" r="1.6" fill="#f5c2e7">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-86" cy="20" r="1.4" fill="#fab387">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
