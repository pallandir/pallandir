name: Latest dev.to articles

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest dev.to posts into README
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://dev.to/feed/pallandir"
          max_post_count: 4
          template: "- [$title]($url) <sub>· $newline_$date</sub>$newline$newline"
          comment_tag_name: "BLOG-POST-LIST"
          commit_message: "chore: refresh latest dev.to articles"
